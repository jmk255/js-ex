<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>무한스크롤</title>
  <style>
    *{margin:0; padding:0;}
    .box{
      width:100%;
      height:100vh;
    }
    .box:nth-child(odd){background-color:gold;}
    .box:nth-child(even){background-color:tomato;}
  </style>
</head>
<body>
  <section>
    <div class="box">1번째 블록</div>
    <div class="box">2번째 블록</div>
  </section>
  <script>
    //추가할 요소의 순번
    let count = 2;
    addEventListener("scroll", () => {
      //window.innerHeight = 실제 사용자가 보고 있는 영역의 높이
      //window.scrollY = 스크롤이 세로로 이동한 값
      //document.body.offsetHeight = 요소의 실제 높이(보더와 패딩 포함)
      if(innerHeight + scrollY >= document.body.offsetHeight){//스크롤이 최하단으로 스크롤 됬을때 실행
        //div요소생성
        const toAdd = document.createElement("div");
        toAdd.classList.add("box");//div요소에 box클래스 추가
        toAdd.textContent = `${++count}번째 블록`;//생성한 text를 div에 넣기
        //section에 생성한 div요소를 추가
        document.querySelector("section").appendChild(toAdd);
      }
    });
  </script>
</body>
</html>

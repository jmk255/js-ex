<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>함수</title>
</head>
<body>
  <script>
    //add함수를 생성 파라미터(매개변수)로 a와 b를 전달받음
    function add(a, b){
      //파라미터를 전달받지 않으면 초기값(undefined)가 리턴됩니다
      return a + b;//함수를 호출한 곳으로 a+b값을 리턴합니다
    }
    console.log(add(10, 20)); //30을 리턴받음
    console.log(add("hello", "world")); //문자를 연결해서 리턴
    console.log(add("hello")); //helloundefined
  </script>
</body>
</html>

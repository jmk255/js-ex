<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>while문</title>
</head>
<body>
  <script>
    //조건식의 평가 결과가 참이면 코드 블록을 계속해서 반복 실행한다.
    //for문은 반복 횟수가 명확할 때 주로 사용하고 while문은 반복횟수가 불명확할때 주로 사용한다.
    //while(조건문){조건문이 참이면 반복실행}

    let i = 0;
    while(i < 10){ //조건문이 참이면 while문이 반복 실행된다
      console.log(i)
      ++i;//1씩 증가
    }

    //do...while문
    //do...while문은 코드 블록을 먼저 실행하고 조건식을 평가한다. 따라서 무조건 한번은 실행된다
    let count = 0;
    do{
      console.log(count);
      count++;
    } while (count < 0);
  </script>
</body>
</html>

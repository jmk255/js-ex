<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이미지 목록 페이지</title>
  <!--css reset-->
  <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css">
  
  <!--구글 폰트 링크-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR&display=swap" rel="stylesheet">
  <style>
    body{
      text-align: center;
      font-family: "Noto Serif KR", serif;
    }
    #menu{
      outline:1px solid red;
      display:grid;
      gap:30px;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      max-width:1020px;
      margin:auto;
      padding:30px;
    }
    img{
      width:100%;
      aspect-ratio:4 / 3;/*가로 세로 비율 고정*/
      object-fit:cover;
    }
    h1{
      margin:30px 0;
      font-size:40px;
    }
    h2{
      margin-top:6px;
    }
  </style>
</head>
<body>
  <h1>Fruit Juice</h1>
  <div id="menu"></div>
  <script>
    //선택자
    const menu = document.querySelector("#menu");
    //객체
    const strawberry = {
      name:'딸기',
      img: 'strawberry.jpg',
      price: 4500,
    }
    console.log(strawberry, strawberry.img, strawberry['img'])
    //이미지를 배열에 담아 줍니다.
    const lists = [
      {
        name : "딸기",
        img : 'strawberry.jpg',
        price : 4500,
      },
      {
        name : "라임",
        img : 'lime.jpg',
        price : 4500,
      },
      {
        name : "망고",
        img : 'mango.jpg',
        price : 5000,
      },
      {
        name : "레몬",
        img : 'lemon.jpg',
        price : 4000,
      },
      {
        name : "무화과",
        img : 'fig.jpg',
        price : 5000,
      },
      {
        name : "사과",
        img : 'apple.jpg',
        price : 4000,
      },
    ];
    console.log(lists[0]) //strawberry.jpg

    //for(let i = 0; i < lists.length; i++){} : i = 배열원소의 순번
    for(let i of lists){ // i = 배열원소
      //객체 분할 대입 사용
      const {name, img, price} = i
      //이미지 요소
      const content = `<div>
          <img src="img/${img}" alt="">
          <h2>${name}</h2>
          <p>${price}</p>
        </div>`
      //content를 HTML요소로 가장 나중에 나오는 자식 요소의 뒤에 삽입
      menu.insertAdjacentHTML("beforeend", content);
    }
    //textContent나 innerText는 문자열로 표시되기때문에 사용할 수 없다
    //(X) menu.textContent = content

  </script>
</body>
</html>

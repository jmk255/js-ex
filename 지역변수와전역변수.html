<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지역변수와 전역변수</title>
</head>
<body>
  <script>
    var x = 'global';
    //함수 생성
    function foo(){
      console.log(x);
      let x = 'local';
    }
    //함수 호출
    foo();
    console.log(x)
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>화살표함수</title>
</head>
<body>
  <script>
    //콜백 함수 = 다른 함수의 파라미터 값으로 전달되어 호출되는 함수
    function test1(f){
      let result = f(3, 4);
      console.log(result)
    }

    const add = function(a, b){
      return a + b;
    }

    /*화살표 함수 : 화살표 함수는 콜백 함수를 좀더 간결하게 구현하기 위한 문법*/
    const multiply = (a, b) => {
      return a * b;
    }

    test1(add);
    test1(multiply);

  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이미지 랜덤 변경</title>
  <script>
    //배열
    let a = ["one", "two", "three", "four"];
    console.log(a[0]) //a배열의 첫번째 인덱스 값을 호출

    //for of문  = 배열의 원소를 하나씩 꺼내며 반복한다
    for(let s of a){
      console.log(s)
    }
  </script>
  <style>
    img{
      width:200px;
      height:200px;
      object-fit:cover;
    }
  </style>
</head>
<body>
  <img src="img/p1.jpg" alt="">
  <img src="img/p2.jpg" alt="">
  <img src="img/p3.jpg" alt="">
  <script>
    //이미지 요소선택
    const imgs = document.querySelectorAll("img")
    console.log(imgs)

    //imgs(유사배열)의 원소를 순회하면서 이벤트 핸들러 등록
    for(let img of imgs){
      //img요소에 클릭이벤트 핸들러 등록
      img.addEventListener("click", function(){
        // Math.floor(Math.random() * (MAX - MIN + 1) + MIN) : 최소 최대값 사이의 랜덤숫자를 정수로 구하는 공식
        //1~20까지의 실수 중 하나를 선택 소수점 이하 값을 내림처리하고 정수 반환후 변수 n에 저장
        let max = 20;
        let min = 1;
        let n = Math.floor(Math.random() * (max - min + 1)) + min;
        //이미지의 src값에 n값을 적용
        img.src = `img/p${n}.jpg`;
      })
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카운트다운</title>
  <style>
    html, body{
      height:100%; 
      margin:0; 
    }
    .bgimg{
      width:100%;
      height:100%;
      background:url(img/images.jpg) center/cover no-repeat;
      color:#fff;
      font-size:25px;
      font-family: 'Courier New', Courier, monospace;
      position:relative;
    }
    .topleft{
      position:absolute;
      top:0; left:16px;
    }
    .bottomleft{
      position:absolute;
      bottom:0; left:16px;
    }
    .middle{
      position:absolute;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      text-align: center;
    }
    hr{
      width:40%;
      border:1px solid #fff;
    }
  </style>
</head>
<body>
  <div class="bgimg">
    <div class="topleft"><p>Logo</p></div>
    <div class="middle">
      <h1>COMING SOON</h1>
      <hr>
      <p id="demo" style="font-size:30px;"></p>
    </div>
    <div class="bottomleft">
      <p>Some text...</p>
    </div>
  </div>
  <script>
    //카운트다운 날짜를 설정합니다(밀리세컨드단위로)
    const countDownDate = new Date("June 19, 2026 10:06:30").getTime();
    // console.log(countDownDate)

    //1초마다 카운트다운 업데이트
    let timer = setInterval(() => {
      //오늘 날짜 및 시간 정보를 변수에 할당
      const now = new Date().getTime();
      // console.log(now)

      //카운트다운 날짜 - 오늘 날짜 = 남은 시간(밀리세컨드 단위로 값이 반환)
      const distance = countDownDate - now;
      //console.log(distance)

      //일, 시간, 분, 초에 대한 시간 계산
      const day = Math.floor(distance / (1000 * 60 * 60 * 24))
      const hr = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))
      const min = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60))
      const sec = Math.floor((distance % (1000 * 60)) / 1000)

      //#demo요소에 결과 표시
      document.querySelector("#demo").innerHTML = `${day}일 ${hr}시간 ${min}분 ${sec}초`;

      //카운트 다운이 완료되면 "이벤트 종료"라는 문자 출력
      if(distance < 0){
        //setInterval함수 종료
        clearInterval(timer)
        document.querySelector("#demo").innerHTML = "이벤트 종료";
      }
    }, 1000);
  </script>
</body>
</html>

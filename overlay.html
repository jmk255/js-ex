<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마우스를 따라다니는 overlay</title>
  <style>
    *{margin:0; padding:0;}
    #works{
      width:1200px;
      margin:auto;
      display:flex;
      position: relative;
    }
    #works .box{
      width:300px;
      height:280px;
      background-color:#ddd;
      display:flex;
      justify-content: center;
      align-items: center;
      background-position: center;
      background-size:cover;
      background-repeat: no-repeat;
      cursor:pointer;
    }
    #works .box:nth-of-type(1){
      background-image:url(img/image01.jpg);
    }
    #works .box:nth-of-type(2){
      background-image:url(img/image02.jpg);
    }
    #works .box:nth-of-type(3){
      background-image:url(img/image03.jpg);
    }
    #works .box:nth-of-type(4){
      background-image:url(img/image04.jpg);
    }
    #works .box h2{
      color:#fff;
      position:relative;
      z-index: 2;
      font-size:32px;
      opacity:0;
    }
    #works .box:hover h2{
      opacity:1;
      /*커졌다 작아지면서 나타나는 효과*/
      animation: scale 0.5s;
    }
    @keyframes scale {
      50%{scale:1.5;}
    }

    /*overlay*/
    #works .overlay{
      position:absolute;
      width:300px;
      height:280px;
      background-color:rgba(0,0,0,0.5);
      left:0; top:0;
      z-index:1;
      /*포인터 이벤트가 전달되지 않도록 함*/
      pointer-events: none;
      opacity:0;
      transition: .5s;
    }
  </style>
</head>
<body>
  <section id="works">
    <div class="overlay"></div>
    <article class="box">
      <h2>TEXT</h2>
    </article>
    <article class="box">
      <h2>TEXT</h2>
    </article>
    <article class="box">
      <h2>TEXT</h2>
    </article>
    <article class="box">
      <h2>TEXT</h2>
    </article>
  </section>
  <script>
    //선택자
    const boxes = document.querySelectorAll(".box");
    const overlay = document.querySelector(".overlay");
    //box의 넓이값(padding과 border포함)을 구해줍니다.
    const boxWd = boxes[0].offsetWidth;

    //모든 box요소를 순회
    boxes.forEach((box, idx) => {
      //box에 mouseenter이벤트 생성
      box.addEventListener("mouseenter", () => {
        //overlay를 표시
        overlay.style.opacity = 1;
        //overlay요소의 left값으로 box의 넓이 * index값을 적용
        overlay.style.left = boxWd*idx + "px";
      })
      //box에 mouseleave이벤트 생성
      box.addEventListener("mouseleave", () => {
        //overlay를 제거
        overlay.style.opacity = 0;
        //left값 초기화
        overlay.style.left = "0px";
      })
    })
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이미지 갤러리</title>
  <style>
    *{margin:0; padding:0;}
    a{text-decoration: none; color:inherit;}

    #gallery{
      width:100%;
      max-width:800px;
      margin:auto;
      height:450px;
      position:relative;
    }
    .slider{
      width:100%;
      height:100%;
    }
    .slide{
      position:absolute;
      width:100%; height:100%;
      left:0; top:0;
      opacity:0;
      visibility:hidden;
      transition:all .5s;
    }
    .slide.on{
      visibility:visible;
      opacity:1;
    }
    .slide img{
      width:100%; height:100%;
      object-fit:cover;
    }

    /*화살표 버튼*/
    .left, 
    .right{
      font-size:50px;
      position:absolute;
      top:50%; transform:translateY(-50%);
      color:aqua;
      padding:10px;
      opacity:0.2;
    }
    .left:hover,
    .right:hover{
      opacity:1;
    }
    .left{left:0;}
    .right{right:0;}
  </style>
</head>
<body>
  <div id="gallery">
    <div class="slider">
      <div class="slide fade on">
        <img src="img/slide1.jpg" alt="slide 1">
      </div>
      <div class="slide fade">
        <img src="img/slide2.jpg" alt="slide 2">
      </div>
      <div class="slide fade">
        <img src="img/slide3.jpg" alt="slide 3">
      </div>
      <div class="slide fade">
        <img src="img/slide4.jpg" alt="slide 4">
      </div>
    </div>
    <a class="left" href="#">&lt;</a>
    <a class="right" href="#">&gt;</a>
  </div>

  <script>
    //이미지의 순번을 저장할 변수
    let slideIdx = 0;
    //선택자
    const leftBtn = document.querySelector(".left");
    const rightBtn = document.querySelector(".right");
    //모든 슬라이드 요소 선택(querySelectorAll)
    const slides = document.querySelectorAll(".slide");

    //왼쪽 화살표 버튼에 클릭이벤트를 생성
    leftBtn.addEventListener("click", function(){
      //현재 보이는 slide이미지를 안보이게 변경
      slides[slideIdx].classList.remove("on");
      //현재 순번에서 1을 빼서 이전 이미지를 선택(값이 -면 슬라이드의 마지막 순번을 할당)
      slideIdx--;
      if(slideIdx < 0){
        //index는 0부터 카운트되지만 length는 1부터 카운트되므로 length값에서 1을 빼서 index와 동일한 값으로 변경
        slideIdx = slides.length-1;
      } 
      //이전 slide이미지를 보이게 설정
      slides[slideIdx].classList.add("on");
    })

    //오른쪽 화살표에 클릭이벤트 생성
    rightBtn.addEventListener("click", function(){
      //현재 보여지는 slide이미지를 안보이게 설정
      slides[slideIdx].classList.remove("on");
      //slideIdx를 1증가하여 다음 이미지의 순번을 선택, 이때 slides.length - 1(마지막 이미지의 순번)보다 값이 커지면 0으로 설정
      slideIdx++;
      if(slideIdx > slides.length-1){
        slideIdx = 0;
      }
      //다음 slide이미지를 보이게 설정
      slides[slideIdx].classList.add("on");
    })


  </script>
</body>
</html>

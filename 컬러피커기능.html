<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>컬러피커기능</title>
  <style>
    body{
      text-align: center;
      display:grid;
      place-items:center;/*안쪽 요소들을 가운데 정렬해 줍니다*/
      height:100vh;
      background:#000;
      margin:0;
    }
    div{
      background:#fff;
      padding:2em;
      border-radius: 1em;
      width:14em;
      box-shadow:0 0 1em rgba(0,0,0, .5);
    }
  </style>
  <script>
    //최상위 요소 = window객체(window객체는 생략이 가능하다)
    window.addEventListener("load", function(){
      //문서내의 모든 요소가 다 렌더링된 후에 자바스크립트 코드를 실행해라
      
      //colorText요소 선택
      const text = document.querySelector("#colorText");
      //colorPicker요소 선택
      const color = document.querySelector("#colorPicker");

      //1 color의 색상코드를 text에 표시
      text.textContent = "컬러 코드 : " + color.value;
      
      //2 color에 이벤트 핸들러 등록(컬러 피커 변경시)
      color.addEventListener("input", function(){
        //console.log(1)
        //3 선택한 색을 body의 배경색으로 설정
        document.body.style.backgroundColor = color.value;
        //4 컬러 코드를 text에 표시
        text.textContent = "컬러 코드 : " + color.value;
      })

    })
    
  </script>
</head>
<body>
  <div>
    <p id="colorText">컬러 코드 검색</p>
    <input id="colorPicker" type="color">
  </div>
</body>
</html>

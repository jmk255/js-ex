<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>var let const</title>
</head>
<body>
  <script>
    //var 키워드로 변수 선언
    var x = 1;
    var y = 1;
    //var 키워드로 선언된 변수는 같은 스코프(영역) 내에서 중복 선언을 허용한다.
    //초기화문이 있는 변수 선언문은 자바스크립트 엔진에 의해 var 키워드가 없는 것처럼 동작한다.
    var x = 100;
    //초기화 문이 없는 변수 선언문은 무시된다
    var y;
    console.log(x, y)

    //함수 레벨 스코프
    //var 키워드는 함수의 코드 블록만을 지역 스코프로 인정한다.(if, for, switch문 등의 코드 블록은 지역스코프로 인정하지 않는다)
    if(true){
      var x = 10;
    }
    {
      let i = 10;
    }
    console.log(i)
    console.log(x)

    //let키워드 = 중복 선언 금지, 블록 레벨 스코프, 호이스팅이 발생되지 않는것처럼 동작(변수 생성문 위에서 호출불가) 
  </script>
</body>
</html>

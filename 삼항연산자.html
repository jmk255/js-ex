  <script>
    //조건식 ? 조건식이 참이면 실행 : 조건식이 거짓이면 실행
    let x = 2;
    let result;

    // if(x % 2){//1이면 true(-1도 true), 0이면 false
    //   result = "홀수"
    // }else{
    //   result = "짝수"
    // }

    result = x % 2 ? '홀수' : '짝수'
    console.log(result)

    //경우의 수가 세가지일 경우
    let num = 0;
    //0은 false로 취급된다
    let kind = num ? (num > 0 ? "양수" : "음수") : "영";
    console.log(kind)
  </script>

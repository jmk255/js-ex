<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>토글 스위치</title>
  <style>
    .switch{
      position:relative;
      display:inline-block;
      width:60px; height:34px;
    }
    .switch input{display:none;}

    .slider{
      position:absolute;
      inset:0;
      background-color:#ccc;
      cursor:pointer;
      transition: .4s;
    }
    .slider::before{/*가상요소*/
      content:"";
      position:absolute;
      width:26px; height:26px;
      top:4px; left:4px;
      background-color:#fff;
      transition: .4s;
    }

    /*check박스 체크시 적용되는 스타일*/
    input:checked + .slider{
      background-color:#2196f3;
    }
    input:checked + .slider::before{
      transform:translateX(26px);
    }

    /*round*/
    .slider.round{
      border-radius: 34px;
    }
    .slider.round::before{
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <label class="switch">
    <input type="checkbox" checked>
    <span class="slider"></span>
  </label>
  <br><br>
  <label class="switch">
    <input type="checkbox">
    <span class="slider round"></span>
  </label>
</body>
</html>

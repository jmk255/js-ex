<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 체크</title>
</head>
<body>
  <h1>Login</h1>
  <form id="loginForm">
    <label for="username">Username : </label>
    <!--required = 필수입력폼-->
    <input type="text" id="username" name="username" required>
    <br>
    <label for="password">Password : </label>
    <input type="password" id="password" name="password" required>
    <br>
    <!--버튼을 클릭하면 checkLogin함수가 호출-->
    <button type="button" onclick="checkLogin()">Login</button>
  </form>
  <p id="msg"></p>

  <script>
    //validUsername과 validPassword변수에 올바른 사용자 이름과 비밀번호를 할당
    const validUsername = 'user';
    const validPassword = "pass";
    //checkLogin함수를 생성
    function checkLogin(){

      //사용자가 입력한 username과 password를 변수에 할당
      const username = document.querySelector("#username").value;
      const password = document.querySelector("#password").value;
      //콘솔창에 username과 password를 출력
      //console.log(username, password);

      //username과 password가 validUsername과 validPassword와 둘다 같은지 확인(둘 다 같으면 true,하나라도 틀리면 false)
      const isLoginValid = (username === validUsername) && (password === validPassword)
      console.log(isLoginValid)

      //아이디가 msg인 요소를 선택
      const msgEl = document.querySelector("#msg");
      //username과 password가 올바르면(true) msgEl에 "로그인 성공"이라는 글자를 넣어주고, username과 password중 하나라도 다르면(false) "로그인 실패" 라는 글자를 넣어줍니다.
      if(isLoginValid){//isLoginValid가 true면 실행되는 코드
        msgEl.textContent = "로그인 성공"
        //style속성을 변경하는 코드
        msgEl.style.color = "green";
      } else {//isLoginValid가 false면 실행되는 코드
        msgEl.textContent = "로그인 실패"
        msgEl.style.color = "red";
      }
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>switch문</title>
</head>
<body>
  <script>
    //주어진 표현식을 평가하여 그 값과 일치하는 표현식을 갖는 case문으로 실행 흐름을 옮긴다.
    /*
    switch (표현식) {
      case 표현식1 : 
        switch문의 표현식과 표현식1이 일치하면 실행될 구문
        break; //코드 블럭 탈출
      case 표현식2 :
        switch문의 표현식과 표현식2이 일치하면 실행될 구문
        break; //코드 블럭 탈출
      default:
        switch문의 표현식과 일치하는 case문이 없을때 실행될 구문
    }
    */

    //입력값을 val변수에 할당
    let val = prompt("a,b,c중에 알파벳 하나만 입력하세요", "");
    let answer;
    //입력값을 switch문의 인자로 전달
    switch(val){
      case "a":
        answer = "apple"; //입력값이 a면 answer에 apple을 할당
        break;
      case "b":
        answer = "bird";
        break;
      case "c":
        answer = "cat";
        break;
      default:
        answer = "stuff" //입력값이 a,b,c가 아니면 stuff가 할당
    }
    document.write(answer);

    //break문을 사용하지 않을 경우
    //월을 영어로 변환한다. (11 -> December)

    let month = 11;
    let monthName;
    switch(month){
      case 0 : monthName = "January";
      case 1 : monthName = "February";
      case 2 : monthName = "March";
      case 3 : monthName = "April";
      case 4 : monthName = "May";
      case 5 : monthName = "June";
      case 6 : monthName = "July";
      case 7 : monthName = "August";
      case 8 : monthName = "September";
      case 9 : monthName = "October";
      case 10 : monthName = "November";
      case 11 : monthName = "December";
      default : monthName = "Invalid month";
    }
    console.log(monthName) //break문을 사용하지 않아 switch문을 탈출하지 않고 switch문이 끝날때까지 이후의 모든 case문과 default문이 샐행되어 결과가 "Invalid month"가 나옴(폴스루 fall through)
  </script>
</body>
</html>

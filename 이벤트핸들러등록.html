<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이벤트핸들러등록</title>
</head>
<body>
  <!--1. 이벤트 핸들러 어트리뷰트 방식-->
  <button onclick="sayHi('Lee')">Click Me!</button>
  <button class="btn1">클릭1</button>
  <button class="btn2">클릭2</button>
  <script>
    function sayHi(name) {
      alert("Hi " + name);
    }

    //2. 이벤트 핸들러 프로퍼티 방식
    const btn1 = document.querySelector(".btn1");//.btn1을 선택

    btn1.onclick = function(){//익명함수(이름이 없는 함수)
      console.log("button click") //콘솔에 출력
    }

    //3. addEventListener 방식
    //타겟요소.addEventListener(이벤트타입, 실행함수)
    const btn2 = document.querySelector(".btn2");
    btn2.addEventListener("click", function(){
      alert("2번 버튼 클릭!")
    })
  </script>
</body>
</html>

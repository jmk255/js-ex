<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과체중테스트</title>
</head>
<body>
  <script>
    //prompt(입력창에 표시할 문자, value) : 입력창을 표시
    let name = prompt("당신의 이름은?", "");
    let height = prompt("당신의 신장은?", "");
    let weight = prompt("당신의 몸무게는?", "");

    //평균 체중 구하는 공식 = (키 - 100) * 0.9;
    let normal_w = (height - 100) * 0.9;

    //입력창으로 입력받은 hegith값과 weight값을 이용하여 경고창으로 평균 체중보다 5kg 미만이면 "저체중"이 출력, 5kg 이상이면 "과체중"이 출력 그외는 "정상체중"이 출력되는 조건문을 작성
    if(weight < normal_w - 5){
      alert("저체중입니다!")
    }else if(weight > normal_w + 5){
      alert("과체중입니다!")
    }else{
      alert("정상체중입니다!")
    }
  </script>
</body>
</html>
